name: Build APK

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
  workflow_dispatch:

# Cancel an older run of this workflow on the same ref when a new push lands —
# keeps PR feedback fresh without piling up wasted runner minutes.
concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          # Defaults already accept licences in v3, but we make it explicit
          # so a future major version bump can't silently change behaviour.
          accept-android-sdk-licenses: true
          log-accepted-android-sdk-licenses: false
          packages: "platform-tools platforms;android-34 build-tools;34.0.0"

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build Debug APK
        run: ./gradlew :app:assembleDebug --no-daemon --stacktrace

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: wellness-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error

      # Release is signed with the in-repo wellness-release.jks (signing
      # config lives in app/build.gradle.kts). The output is therefore
      # installable directly on a device without any extra steps.
      - name: Build Release APK (signed)
        run: ./gradlew :app:assembleRelease --no-daemon --stacktrace

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: wellness-release-apk
          path: app/build/outputs/apk/release/*.apk
          if-no-files-found: error
